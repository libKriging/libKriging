name: C++ Kriging Benchmarks

on:
  push:
    branches:
      - master
      - '*'
    tags:
      - 'bench*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of iterations per test'
        required: false
        default: '10'

env:
  DEBUG_CI: false

jobs:
  benchmark-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            liblapack-dev \
            libblas-dev \
            gfortran

      - name: Setup cmake
        uses: lukka/get-cmake@v4.3.2
        with:
          cmakeVersion: '~3.24.0'

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_OCTAVE_BINDING=OFF \
            -DENABLE_PYTHON_BINDING=OFF \
            -DENABLE_R_BINDING=OFF

      - name: Run all benchmark configurations
        shell: bash
        run: |
          ITERATIONS=${{ github.event.inputs.iterations || '10' }}

          # Initialize results directory
          mkdir -p build/benchmark-results

          # Run all combinations using bench.sh (it handles building internally)
          # Use --clean for the first benchmark to ensure fresh compilation
          FIRST_RUN=true
          for n in 100 200 400; do
            for d in 2 4 8; do
              for bench in kriging nuggetkriging noisekriging; do
                echo "Running: n=$n d=$d benchmark=$bench iterations=$ITERATIONS"
                if [ "$FIRST_RUN" = true ]; then
                  bash bench/bench.sh --clean iterations=$ITERATIONS n=$n d=$d $bench > "build/benchmark-results/${bench}_n${n}_d${d}.log" 2>&1 || echo "Warning: benchmark failed for $bench n=$n d=$d"
                  FIRST_RUN=false
                else
                  bash bench/bench.sh iterations=$ITERATIONS n=$n d=$d $bench > "build/benchmark-results/${bench}_n${n}_d${d}.log" 2>&1 || echo "Warning: benchmark failed for $bench n=$n d=$d"
                fi
              done
            done
          done

          # Large-n benchmarks: NestedKriging (divide-and-conquer) and Vecchia
          # (VLL objective). Their point is n beyond the exact-kriging comfort
          # zone, so they get a dedicated size grid.
          for n in 400 1000 2000; do
            for d in 2 4; do
              for bench in nestedkriging vecchia; do
                echo "Running: n=$n d=$d benchmark=$bench iterations=$ITERATIONS"
                bash bench/bench.sh iterations=$ITERATIONS n=$n d=$d $bench > "build/benchmark-results/${bench}_n${n}_d${d}.log" 2>&1 || echo "Warning: benchmark failed for $bench n=$n d=$d"
              done
            done
          done

          # WarpKriging benchmarks — each warping is treated as its own class.
          # Fewer iterations since fit is much slower (seconds vs milliseconds).
          WARP_ITERATIONS=$(( ITERATIONS < 2 ? ITERATIONS : 2 ))
          for n in 100 200 400; do
            for d in 2 4 8; do
              for warp in none affine boxcox kumaraswamy knots mlp neural_mono categorical ordinal; do
                echo "Running: n=$n d=$d warpkriging:$warp iterations=$WARP_ITERATIONS"
                bash bench/bench.sh iterations=$WARP_ITERATIONS n=$n d=$d warpkriging warping=$warp > "build/benchmark-results/warpkriging_${warp}_n${n}_d${d}.log" 2>&1 || echo "Warning: benchmark failed for warpkriging:$warp n=$n d=$d"
              done
            done
          done

          # MLPKriging benchmarks — each architecture config is treated separately.
          MLP_ITERATIONS=$(( ITERATIONS < 2 ? ITERATIONS : 2 ))
          for n in 100 200 400; do
            for d in 2 4 8; do
              for cfg in small_selu medium_selu large_selu small_tanh adam_only; do
                echo "Running: n=$n d=$d mlpkriging:$cfg iterations=$MLP_ITERATIONS"
                bash bench/bench.sh iterations=$MLP_ITERATIONS n=$n d=$d mlpkriging warping=$cfg > "build/benchmark-results/mlpkriging_${cfg}_n${n}_d${d}.log" 2>&1 || echo "Warning: benchmark failed for mlpkriging:$cfg n=$n d=$d"
              done
            done
          done

      - name: Generate markdown report
        shell: bash
        run: |
          cd build
          ITERATIONS=${{ github.event.inputs.iterations || '10' }}
          WARP_ITERATIONS=$(( ITERATIONS < 2 ? ITERATIONS : 2 ))
          MLP_ITERATIONS=$(( ITERATIONS < 2 ? ITERATIONS : 2 ))
          REPORT="benchmark-results/BENCHMARK_REPORT.md"

          # Header
          echo "# C++ Kriging Benchmarks Report" > "$REPORT"
          echo "" >> "$REPORT"
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$REPORT"
          echo "**Platform:** Ubuntu (latest)" >> "$REPORT"
          echo "**Build Type:** Release" >> "$REPORT"
          echo "**Iterations:** $ITERATIONS (WarpKriging: $WARP_ITERATIONS, MLPKriging: $MLP_ITERATIONS)" >> "$REPORT"
          echo "**Test function:** f(x) = sum_i sin(2*pi*x_i) (categorical/ordinal: x_0 discrete 5 levels)" >> "$REPORT"
          echo "" >> "$REPORT"

          # Table of Contents
          echo "## Summary Tables" >> "$REPORT"
          echo "" >> "$REPORT"

          # --- Kriging/NuggetKriging/NoiseKriging summaries (n x d) ---
          for bench in kriging nuggetkriging noisekriging; do
            BENCH_NAME="${bench^}"
            if [ "$bench" = "nuggetkriging" ]; then BENCH_NAME="NuggetKriging"; fi
            if [ "$bench" = "noisekriging" ]; then BENCH_NAME="NoiseKriging"; fi

            echo "### $BENCH_NAME" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "| n | d | fit (ms) | predict (ms) | simulate (ms) | update (ms) |" >> "$REPORT"
            echo "|---|---|----------|--------------|---------------|-------------|" >> "$REPORT"
            for n in 100 200 400; do
              for d in 2 4 8; do
                logfile="benchmark-results/${bench}_n${n}_d${d}.log"
                if [ -f "$logfile" ]; then
                  fit=$(grep "^fit" "$logfile" | awk '{print $3}' || echo "N/A")
                  pred=$(grep "^predict" "$logfile" | awk '{print $3}' || echo "N/A")
                  sim=$(grep "^simulate" "$logfile" | awk '{print $3}' || echo "N/A")
                  upd=$(grep "^update " "$logfile" | awk '{print $3}' || echo "N/A")
                  echo "| $n | $d | $fit | $pred | $sim | $upd |" >> "$REPORT"
                fi
              done
            done
            echo "" >> "$REPORT"
          done

          # --- NestedKriging summary (large-n grid) ---
          echo "### NestedKriging (NK & gPoE aggregations, groups of ~100 points)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| n | d | fit NK (ms) | predict NK (ms) | fit gPoE (ms) | predict gPoE (ms) |" >> "$REPORT"
          echo "|---|---|-------------|-----------------|---------------|--------------------|" >> "$REPORT"
          for n in 400 1000 2000; do
            for d in 2 4; do
              logfile="benchmark-results/nestedkriging_n${n}_d${d}.log"
              if [ -f "$logfile" ]; then
                fit=$(grep "^fit  " "$logfile" | awk '{print $3}' || echo "N/A")
                pred=$(grep "^predict  " "$logfile" | awk '{print $3}' || echo "N/A")
                fitg=$(grep "^fit_gpoe" "$logfile" | awk '{print $3}' || echo "N/A")
                predg=$(grep "^predict_gpoe" "$logfile" | awk '{print $3}' || echo "N/A")
                echo "| $n | $d | $fit | $pred | $fitg | $predg |" >> "$REPORT"
              fi
            done
          done
          echo "" >> "$REPORT"

          # --- Vecchia summary (large-n grid; exact-LL columns are skipped
          #     by bench-vecchia beyond n=1000, shown as empty) ---
          echo "### Vecchia (objective=VLL(30) vs exact LL)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| n | d | fit VLL (ms) | fit light (ms) | fit LL (ms) | predict (ms) | predictVecchia (ms) | VLL eval (ms) | LL eval (ms) |" >> "$REPORT"
          echo "|---|---|--------------|----------------|-------------|--------------|---------------------|---------------|--------------|" >> "$REPORT"
          for n in 400 1000 2000; do
            for d in 2 4; do
              logfile="benchmark-results/vecchia_n${n}_d${d}.log"
              if [ -f "$logfile" ]; then
                fit=$(grep "^fit  " "$logfile" | awk '{print $3}' || echo "N/A")
                fitl=$(grep "^fit_light" "$logfile" | awk '{print $3}' || echo "N/A")
                fite=$(grep "^fit_exact_ll" "$logfile" | awk '{print $3}' || echo "-")
                pred=$(grep "^predict  " "$logfile" | awk '{print $3}' || echo "N/A")
                predv=$(grep "^predict_vecchia" "$logfile" | awk '{print $3}' || echo "N/A")
                vlle=$(grep "^vll_eval" "$logfile" | awk '{print $3}' || echo "N/A")
                lle=$(grep "^ll_eval" "$logfile" | awk '{print $3}' || echo "-")
                echo "| $n | $d | $fit | $fitl | ${fite:--} | $pred | $predv | $vlle | ${lle:--} |" >> "$REPORT"
              fi
            done
          done
          echo "" >> "$REPORT"

          # --- WarpKriging:<warping> summaries (n x d) ---
          for warp in none affine boxcox kumaraswamy knots mlp neural_mono categorical ordinal; do
            echo "### WarpKriging:$warp" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "| n | d | fit (ms) | predict (ms) | simulate (ms) | update (ms) |" >> "$REPORT"
            echo "|---|---|----------|--------------|---------------|-------------|" >> "$REPORT"
            for n in 100 200 400; do
              for d in 2 4 8; do
                logfile="benchmark-results/warpkriging_${warp}_n${n}_d${d}.log"
                if [ -f "$logfile" ]; then
                  fit=$(grep "^fit" "$logfile" | awk '{print $3}' || echo "N/A")
                  pred=$(grep "^predict" "$logfile" | awk '{print $3}' || echo "N/A")
                  sim=$(grep "^simulate" "$logfile" | awk '{print $3}' || echo "N/A")
                  upd=$(grep "^update " "$logfile" | awk '{print $3}' || echo "N/A")
                  echo "| $n | $d | $fit | $pred | $sim | $upd |" >> "$REPORT"
                fi
              done
            done
            echo "" >> "$REPORT"
          done

          # --- MLPKriging:<config> summaries (n x d) ---
          for cfg in small_selu medium_selu large_selu small_tanh adam_only; do
            echo "### MLPKriging:$cfg" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "| n | d | fit (ms) | predict (ms) | simulate (ms) | update (ms) |" >> "$REPORT"
            echo "|---|---|----------|--------------|---------------|-------------|" >> "$REPORT"
            for n in 100 200 400; do
              for d in 2 4 8; do
                logfile="benchmark-results/mlpkriging_${cfg}_n${n}_d${d}.log"
                if [ -f "$logfile" ]; then
                  fit=$(grep "^fit" "$logfile" | awk '{print $3}' || echo "N/A")
                  pred=$(grep "^predict" "$logfile" | awk '{print $3}' || echo "N/A")
                  sim=$(grep "^simulate" "$logfile" | awk '{print $3}' || echo "N/A")
                  upd=$(grep "^update " "$logfile" | awk '{print $3}' || echo "N/A")
                  echo "| $n | $d | $fit | $pred | $sim | $upd |" >> "$REPORT"
                fi
              done
            done
            echo "" >> "$REPORT"
          done

          # --- Detailed Results ---
          echo "## Detailed Results" >> "$REPORT"
          echo "" >> "$REPORT"

          for bench in kriging nuggetkriging noisekriging; do
            BENCH_NAME="${bench^}"
            if [ "$bench" = "nuggetkriging" ]; then BENCH_NAME="NuggetKriging"; fi
            if [ "$bench" = "noisekriging" ]; then BENCH_NAME="NoiseKriging"; fi

            echo "### $BENCH_NAME" >> "$REPORT"
            echo "" >> "$REPORT"

            for n in 100 200 400; do
              for d in 2 4 8; do
                logfile="benchmark-results/${bench}_n${n}_d${d}.log"
                if [ -f "$logfile" ]; then
                  echo "#### n=$n, d=$d" >> "$REPORT"
                  echo "" >> "$REPORT"
                  echo "\`\`\`" >> "$REPORT"
                  cat "$logfile" | grep -A 100 "n=$n d=$d" | grep -v "Results saved" >> "$REPORT" || true
                  echo "\`\`\`" >> "$REPORT"
                  echo "" >> "$REPORT"
                fi
              done
            done
          done

          for warp in none affine boxcox kumaraswamy knots mlp neural_mono categorical ordinal; do
            echo "### WarpKriging:$warp" >> "$REPORT"
            echo "" >> "$REPORT"

            for n in 100 200 400; do
              for d in 2 4 8; do
                logfile="benchmark-results/warpkriging_${warp}_n${n}_d${d}.log"
                if [ -f "$logfile" ]; then
                  echo "#### n=$n, d=$d" >> "$REPORT"
                  echo "" >> "$REPORT"
                  echo "\`\`\`" >> "$REPORT"
                  cat "$logfile" | grep -A 100 "warpkriging:" | grep -v "Results saved" >> "$REPORT" || true
                  echo "\`\`\`" >> "$REPORT"
                  echo "" >> "$REPORT"
                fi
              done
            done
          done

          for cfg in small_selu medium_selu large_selu small_tanh adam_only; do
            echo "### MLPKriging:$cfg" >> "$REPORT"
            echo "" >> "$REPORT"

            for n in 100 200 400; do
              for d in 2 4 8; do
                logfile="benchmark-results/mlpkriging_${cfg}_n${n}_d${d}.log"
                if [ -f "$logfile" ]; then
                  echo "#### n=$n, d=$d" >> "$REPORT"
                  echo "" >> "$REPORT"
                  echo "\`\`\`" >> "$REPORT"
                  cat "$logfile" | grep -A 100 "mlpkriging:" | grep -v "Results saved" >> "$REPORT" || true
                  echo "\`\`\`" >> "$REPORT"
                  echo "" >> "$REPORT"
                fi
              done
            done
          done

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: cpp-benchmark-results
          path: |
            build/benchmark-results/*.log
            build/benchmark-results/BENCHMARK_REPORT.md
          retention-days: 90

      - name: Display summary report
        shell: bash
        run: |
          cd build
          cat benchmark-results/BENCHMARK_REPORT.md

      - name: Add report to job summary
        shell: bash
        run: |
          cd build
          cat benchmark-results/BENCHMARK_REPORT.md >> $GITHUB_STEP_SUMMARY
