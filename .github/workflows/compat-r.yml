name: R compatibility check (Kriging vs v0.9.3)

# Verifies that the unified Kriging API (with noise= parameter) produces
# numerically identical results to the separate Kriging / NoiseKriging /
# NuggetKriging classes from the v0.9.3 release.

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  schedule:
    - cron: '0 3 * * SAT'

env:
  DEBUG_CI: true
  REF_RDS: /tmp/rlibkriging_v093_ref.rds

jobs:
  r-compat:
    name: "R Kriging vs v0.9.3 (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            r093_asset: rlibkriging_0.9.3_Linux-x86_64.tgz
          - os: macos-latest
            r093_asset: rlibkriging_0.9.3_macOS15.7.3-arm64.tgz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: pre-install (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y liblapack-dev gfortran

      - name: Install R package dependencies
        shell: Rscript {0}
        run: install.packages(c("testthat"))

      # ── Step 1: Install v0.9.3 and generate reference values ─────────────────

      - name: Download v0.9.3 rlibkriging binary
        shell: bash
        run: |
          mkdir -p /tmp/v093
          gh release download v0.9.3 \
            --repo libKriging/libKriging \
            --pattern '${{ matrix.r093_asset }}' \
            --dir /tmp/v093
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install v0.9.3 rlibkriging
        shell: bash
        run: |
          mkdir -p Rlibs_v093
          Rscript -e "install.packages('/tmp/v093/${{ matrix.r093_asset }}', repos=NULL, lib='Rlibs_v093', type='binary')" \
            || Rscript -e "install.packages('/tmp/v093/${{ matrix.r093_asset }}', repos=NULL, lib='Rlibs_v093')"

      - name: Generate reference values from v0.9.3
        shell: bash
        run: R_LIBS=Rlibs_v093 Rscript tools/compat/generate_v093_reference.R "$REF_RDS"

      # ── Step 2: Build and install current rlibkriging ─────────────────────────

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.24.x'

      - name: before_script
        shell: bash
        run: tools/common/before_script.sh

      - name: Install R build dependencies
        shell: bash
        run: tools/r-linux-macos/install.sh

      - name: Build current rlibkriging
        shell: bash
        run: tools/r-linux-macos/build.sh

      # ── Step 3: Compare current vs v0.9.3 ────────────────────────────────────

      - name: Compare Kriging / NoiseKriging / NuggetKriging vs v0.9.3
        shell: bash
        run: |
          R_LIBS=bindings/R/Rlibs Rscript tools/compat/check_vs_v093.R "$REF_RDS"

      - name: Upload reference and diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compat-artifacts-${{ runner.os }}
          path: |
            /tmp/rlibkriging_v093_ref.rds
            **/*.log
